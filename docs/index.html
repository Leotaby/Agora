<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGORA - Banking Contagion Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#00ff41;--cyan:#00ffff;--orange:#ff6b00;--red:#ff0040;--blue:#0088ff;--bg:#000000;--panel:rgba(0,8,0,0.85);--border:rgba(0,255,65,0.15)}
body{background:var(--bg);color:var(--green);font-family:'Courier New',Courier,monospace;overflow:hidden;height:100vh;width:100vw}

/* Layout */
#app{display:flex;height:100vh;width:100vw}
#left-panel{width:220px;min-width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
#center{flex:1;position:relative}
#right-panel{width:200px;min-width:200px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:10}

/* Left panel - terminal feed */
#left-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,65,0.5)}
#terminal{flex:1;overflow-y:auto;padding:6px 8px;font-size:10px;line-height:1.6;scrollbar-width:none}
#terminal::-webkit-scrollbar{display:none}
.term-line{white-space:nowrap;overflow:hidden}
.term-line .ts{color:rgba(0,255,65,0.4)}
.term-line .ch{color:var(--cyan)}
.term-line .bank{color:#fff;font-weight:700}
.term-line .loss{color:var(--red)}
.term-line .ela{color:var(--blue)}
.term-line .amt{color:var(--orange)}
.term-cursor{display:inline-block;width:6px;height:12px;background:var(--green);animation:blink 0.8s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}

/* Right panel - bank status */
#right-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,65,0.5)}
#bank-list{flex:1;overflow-y:auto;padding:4px 0}
.bank-card{padding:8px 10px;margin:3px 6px;border:1px solid rgba(0,255,65,0.08);border-radius:2px;transition:all 0.5s}
.bank-card.normal{border-left:3px solid var(--green)}
.bank-card.stressed{border-left:3px solid var(--orange)}
.bank-card.critical{border-left:3px solid var(--red)}
.bank-card.ecb{border-left:3px solid var(--blue);background:rgba(0,60,180,0.1)}
.bank-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ffffff;margin-bottom:4px}
.cet1-num{font-size:16px;font-weight:700;margin-bottom:3px;transition:color 0.5s}
.cet1-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cet1-label{font-size:8px;color:rgba(0,255,65,0.4);width:28px;text-transform:uppercase}
.cet1-bar-bg{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.cet1-bar{height:100%;border-radius:2px;transition:width 0.8s ease,background 0.5s}
.bank-meta{font-size:8px;color:rgba(255,255,255,0.35);display:flex;justify-content:space-between;align-items:center}
.status-tag{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:2px;display:inline-block}
.status-tag.normal{color:var(--green);background:rgba(0,255,65,0.1)}
.status-tag.stressed{color:var(--orange);background:rgba(255,107,0,0.12)}
.status-tag.critical{color:var(--red);background:rgba(255,0,64,0.12)}

/* Bottom HUD */
#hud{position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(transparent,rgba(0,0,0,0.95));display:flex;align-items:flex-end;justify-content:center;gap:40px;padding-bottom:10px;z-index:10;pointer-events:none}
.hud-item{text-align:center}
.hud-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,65,0.35);margin-bottom:2px}
.hud-val{font-size:16px;font-weight:700;text-shadow:0 0 10px currentColor}
.hud-val.green{color:var(--green)}
.hud-val.orange{color:var(--orange)}
.hud-val.red{color:var(--red)}
.hud-val.blue{color:var(--blue)}

/* Controls overlay */
#controls{position:absolute;top:10px;left:10px;z-index:20;display:flex;gap:6px;align-items:center}
#controls button{background:rgba(0,20,0,0.8);border:1px solid rgba(0,255,65,0.3);color:var(--green);font-family:inherit;font-size:10px;padding:6px 14px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
#controls button:hover{background:rgba(0,40,0,0.9);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,65,0.2)}
#controls button.active{background:rgba(0,60,0,0.8);border-color:var(--green);box-shadow:0 0 12px rgba(0,255,65,0.3)}
#speed-group{display:flex;align-items:center;gap:6px;margin-left:8px}
#speed-group label{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,255,65,0.4)}
#speed-slider{-webkit-appearance:none;width:80px;height:2px;background:rgba(0,255,65,0.2);outline:none;border-radius:1px}
#speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--green);border-radius:50%;cursor:pointer;box-shadow:0 0 6px var(--green)}
#speed-label{font-size:9px;color:var(--green);width:50px}

/* Title */
#title{position:absolute;top:10px;right:10px;z-index:15;text-align:right;pointer-events:none}
#title h1{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(0,255,65,0.4);font-weight:400}
#title .sub{font-size:9px;color:rgba(0,255,65,0.2);margin-top:2px}

/* ECB banner */
#ecb-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;
  background:rgba(0,10,40,0.95);border:1px solid var(--blue);padding:16px 32px;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);
  display:none;text-align:center;pointer-events:none;box-shadow:0 0 40px rgba(0,136,255,0.3)}
#ecb-banner .amt{font-size:22px;font-weight:700;margin-top:6px;text-shadow:0 0 15px var(--blue)}

/* Help modal */
#help-btn{background:rgba(0,20,0,0.8);border:1px solid rgba(0,255,65,0.2);color:rgba(0,255,65,0.5);font-family:inherit;font-size:10px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#help-modal{display:none;position:absolute;top:40px;left:10px;z-index:50;background:rgba(0,8,0,0.95);border:1px solid var(--border);padding:12px 16px;font-size:9px;line-height:1.8;max-width:220px}
#help-modal kbd{background:rgba(0,255,65,0.1);border:1px solid rgba(0,255,65,0.2);padding:1px 5px;border-radius:2px;font-family:inherit}
</style>
</head>

<div id="app">

<!-- LEFT PANEL: Terminal feed -->
<div id="left-panel">

</div>

<div id="center">
  <div id="controls">

    <button id="btn-reset">RESET</button>
    <div id="speed-group">
      <label>SPD</label>
      <input type="range" id="speed-slider" min="0" max="2" value="1" step="1">
      <span id="speed-label">NORMAL</span>
    </div>
    <button id="help-btn">?</button>
  </div>
  <div id="help-modal">
    <div style="color:var(--green);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">SHORTCUTS</div>
    <kbd>SPACE</kbd> Play / Pause<br>
    <kbd>R</kbd> Reset<br>
    <kbd>&#8594;</kbd> Next round<br>

    <kbd>?</kbd> Toggle help
  </div>
  <div id="title">
    <h1>AGORA</h1>
    <div class="sub">2011 EBA CALIBRATION</div>
  </div>
  <div id="ecb-banner">

    <div class="amt" id="ecb-amt"></div>
  </div>
  <div id="canvas-wrap"></div>
  <div id="hud">

    <div class="hud-item"><div class="hud-label">TOTAL LOSSES</div><div class="hud-val orange" id="h-loss">0 BN</div></div>
    <div class="hud-item"><div class="hud-label">BANKS CRITICAL</div><div class="hud-val red" id="h-crit">0</div></div>
    <div class="hud-item"><div class="hud-label">ECB ELA</div><div class="hud-val blue" id="h-ela">0 BN</div></div>
  </div>
</div>

<!-- RIGHT PANEL: Bank status -->
<div id="right-panel">
  <div id="right-header">&#9608; bank status</div>
  <div id="bank-list"></div>
</div>

</div>

  {r:12, lines:["","[ECB]  *** EMERGENCY LIQUIDITY ASSISTANCE ***","[ECB]  DBK :: +50.0 BN ELA","[ECB]  BNP :: +50.0 BN ELA","[ECB]  CBK :: +47.5 BN ELA","[ECB]  BAYLB :: +26.8 BN ELA","[ECB]  UBS :: +50.0 BN ELA","[ECB]  TOTAL ELA DEPLOYED :: 224.3 BN EUR","","[SYS]  SIMULATION COMPLETE","[SYS]  BANKS CRITICAL: 4 / STRESSED: 1 / NORMAL: 2"]},
];

/* ================================================================
   COLORS
   ================================================================ */
const C_GREEN  = new THREE.Color(0x00ff41);
const C_ORANGE = new THREE.Color(0xff6b00);
const C_RED    = new THREE.Color(0xff0040);
const C_BLUE   = new THREE.Color(0x0088ff);
const C_EDGE   = new THREE.Color(0x0a2a0a);
const STATUS_C = {normal:C_GREEN, stressed:C_ORANGE, critical:C_RED};

/* ================================================================
   THREE.JS SETUP
   ================================================================ */
const wrap = document.getElementById('canvas-wrap');
const centerEl = document.getElementById('center');
const W = ()=>centerEl.clientWidth;
const H = ()=>centerEl.clientHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 300);
camera.position.set(14, 10, 18);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
centerEl.insertBefore(renderer.domElement, centerEl.firstChild);
renderer.domElement.style.position='absolute';
renderer.domElement.style.top='0';
renderer.domElement.style.left='0';

const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.04;
orbit.autoRotate = true;
orbit.autoRotateSpeed = 0.3;
orbit.minDistance = 8;
orbit.maxDistance = 50;
orbit.target.set(0, 0, 0);

// Lights (fix 7: proper illumination)
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const pLight1 = new THREE.PointLight(0xffffff, 1.0, 60);
pLight1.position.set(0, 10, 10);
scene.add(pLight1);
const pLight2 = new THREE.PointLight(0x00ff41, 0.3, 40);
pLight2.position.set(0, 0, 0);
scene.add(pLight2);

/* ================================================================
   STAR FIELD
   ================================================================ */
const starCount = 600;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for(let i=0;i<starCount;i++){
  starPos[i*3]   = (Math.random()-0.5)*120;
  starPos[i*3+1] = (Math.random()-0.5)*80;
  starPos[i*3+2] = (Math.random()-0.5)*120;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.08, transparent:true, opacity:0.35})));

/* ================================================================
   CSS2D LABEL RENDERER
   ================================================================ */
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(W(), H());
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
centerEl.appendChild(labelRenderer.domElement);

/* ================================================================
   BANK SPHERES (fix 3: bright MeshPhongMaterial with emissive)
   ================================================================ */
const meshes = {}, glows = {}, bankLabelEls = {};
for(const [id, b] of Object.entries(BANKS)){
  const r = b.ecb ? 0.9 : 0.3 + Math.sqrt(b.assets/3550)*0.6;
  const col = b.ecb ? C_BLUE : C_GREEN;
  const mat = new THREE.MeshPhongMaterial({color:col, emissive:col, emissiveIntensity:0.4, shininess:80, specular:new THREE.Color(0x444444)});
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(r,32,32), mat);
  mesh.position.set(b.x, b.y, b.z);
  scene.add(mesh);
  meshes[id] = mesh;
  // Glow shell
  const gMat = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.12, side:THREE.BackSide});
  const glow = new THREE.Mesh(new THREE.SphereGeometry(r*1.8,16,16), gMat);
  mesh.add(glow);
  glows[id] = glow;

  // CSS2D Label (fix 1: visible labels above each sphere)
  const labelDiv = document.createElement('div');
  labelDiv.style.cssText = 'font-family:Courier New,monospace;text-align:center;pointer-events:none;text-shadow:0 0 8px rgba(0,0,0,1),0 0 4px rgba(0,0,0,1)';
  if(b.ecb){
    labelDiv.innerHTML = '<div style="font-size:14px;font-weight:700;color:#0088ff;letter-spacing:2px">ECB</div>';
  } else {
    labelDiv.innerHTML = `<div style="font-size:12px;font-weight:700;color:#ffffff;letter-spacing:1px">${id}</div><div class="lbl-cet1" style="font-size:11px;font-weight:700;color:#00ff41">--</div>`;
  }
  const labelObj = new CSS2DObject(labelDiv);
  labelObj.position.set(0, r + 0.5, 0);
  mesh.add(labelObj);
  bankLabelEls[id] = labelDiv;
}

/* ================================================================
   INTERBANK EDGES (fix 2: bright LineBasicMaterial, full opacity)
   ================================================================ */
const edges = [];
for(const e of EXPOSURES){
  const a=BANKS[e.f], b=BANKS[e.t];
  if(!a||!b) continue;
  const pts=[new THREE.Vector3(a.x,a.y,a.z), new THREE.Vector3(b.x,b.y,b.z)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:C_GREEN, transparent:true, opacity:0.3+e.a/15*0.4, linewidth:2});
  const line = new THREE.Line(geo, mat);
  line.userData = {from:e.f, to:e.t, amt:e.a};
  scene.add(line);
  edges.push(line);
}

/* ================================================================
   ECB INTERVENTION BEAMS (curved, hidden initially)
   ================================================================ */
const ecbBeams = {};
for(const id of BANK_ORDER){
  const ecb=BANKS.ECB, b=BANKS[id];
  const pts=[];
  for(let i=0;i<=50;i++){
    const t=i/50;
    pts.push(new THREE.Vector3(
      ecb.x+(b.x-ecb.x)*t,
      ecb.y+(b.y-ecb.y)*t + Math.sin(t*Math.PI)*1.5,
      ecb.z+(b.z-ecb.z)*t
    ));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:C_BLUE, transparent:true, opacity:0});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  ecbBeams[id]={line, mat};
}

/* ================================================================
   SHOCKWAVE RINGS
   ================================================================ */
const shockwaves = [];
function spawnShockwave(bankId){
  const m = meshes[bankId];
  if(!m) return;
  const geo = new THREE.RingGeometry(0.1, 0.15, 32);
  const mat = new THREE.MeshBasicMaterial({color:C_RED, transparent:true, opacity:0.8, side:THREE.DoubleSide});
  const ring = new THREE.Mesh(geo, mat);
  ring.position.copy(m.position);
  ring.lookAt(camera.position);
  scene.add(ring);
  shockwaves.push({mesh:ring, age:0, maxAge:1.5});
}

/* ================================================================
   ECB PARTICLES (blue dots streaming from ECB to targets)
   ================================================================ */
const ecbParticles = [];
function spawnEcbParticles(targets){
  // Clear old
  ecbParticles.forEach(p => scene.remove(p.mesh));
  ecbParticles.length = 0;
  const ecb = BANKS.ECB;
  for(const id of targets){
    const b = BANKS[id];
    if(!b) continue;
    for(let i=0;i<12;i++){
      const geo = new THREE.SphereGeometry(0.04, 6, 6);
      const mat = new THREE.MeshBasicMaterial({color:C_BLUE, transparent:true, opacity:0.8});
      const dot = new THREE.Mesh(geo, mat);
      dot.position.set(ecb.x, ecb.y, ecb.z);
      scene.add(dot);
      ecbParticles.push({mesh:dot, from:ecb, to:b, t:i/12, speed:0.3+Math.random()*0.2});
    }
  }
}
function clearEcbParticles(){
  ecbParticles.forEach(p => scene.remove(p.mesh));
  ecbParticles.length = 0;
}

/* ================================================================
   STATE
   ================================================================ */
let curRound = 0, playing = false, timer = null, ecbActive = false;
let speedMs = 1500;
const SPEEDS = [3000, 1500, 600];
const SPEED_NAMES = ["SLOW","NORMAL","FAST"];

/* ================================================================
   TERMINAL FEED
   ================================================================ */
const termEl = document.getElementById('terminal');
let typeQueue = [], typeTimer = null;

function addTermLine(text){
  // Color-code based on prefix
  let html = text;
  if(text.startsWith('[ECB]'))  html = `<span class="ela">${text}</span>`;
  else if(text.startsWith('[WARN]'))  html = `<span class="loss">${text}</span>`;
  else if(text.startsWith('[SHOCK]')) html = `<span class="loss">${text}</span>`;
  else if(text.startsWith('[SOLV]'))  html = `<span class="amt">${text}</span>`;
  else if(text.startsWith('[CTPY]'))  html = `<span class="ch">${text}</span>`;
  else if(text.startsWith('[FIRE]'))  html = `<span class="amt">${text}</span>`;
  else if(text.startsWith('[LIQ]'))   html = `<span class="ch">${text}</span>`;
  else if(text.startsWith('[CONF]'))  html = `<span style="color:var(--orange)">${text}</span>`;
  else if(text.startsWith('[SYS]'))   html = `<span style="color:rgba(0,255,65,0.5)">${text}</span>`;

  const div = document.createElement('div');
  div.className = 'term-line';
  div.innerHTML = html;
  termEl.appendChild(div);
  termEl.scrollTop = termEl.scrollHeight;
}

function typeLines(lines, cb){
  let i = 0;
  const interval = Math.max(40, speedMs / (lines.length + 1));
  function next(){
    if(i >= lines.length){ if(cb) cb(); return; }
    addTermLine(lines[i]);
    i++;
    typeTimer = setTimeout(next, interval);
  }
  next();
}

function clearTerminal(){
  termEl.innerHTML = '';
  if(typeTimer){ clearTimeout(typeTimer); typeTimer = null; }
}

/* ================================================================
   RIGHT PANEL: BANK STATUS
   ================================================================ */
const bankListEl = document.getElementById('bank-list');

function buildBankCards(){
  bankListEl.innerHTML = '';
  for(const id of BANK_ORDER){
    const div = document.createElement('div');
    div.className = 'bank-card normal';
    div.id = 'card-'+id;
    div.innerHTML = `
      <div class="bank-name" id="bn-${id}">${id} <span style="font-weight:400;font-size:8px;color:rgba(255,255,255,0.3)">${BANKS[id].country}</span></div>
      <div class="cet1-num" id="cv-${id}" style="color:var(--green)">--</div>
      <div class="cet1-row"><span class="cet1-label">CET1</span><div class="cet1-bar-bg"><div class="cet1-bar" id="bar-${id}" style="width:50%;background:var(--green)"></div></div></div>
      <div class="bank-meta"><span>LCR <span id="lcr-${id}">--</span>%</span><span class="status-tag normal" id="st-${id}">HEALTHY</span></div>`;
    bankListEl.appendChild(div);
  }
}

function updateBankCards(data){
  for(const id of BANK_ORDER){
    const d = data.b[id];
    if(!d) continue;
    const card = document.getElementById('card-'+id);
    const bar = document.getElementById('bar-'+id);
    const cv = document.getElementById('cv-'+id);
    const lcr = document.getElementById('lcr-'+id);
    const st = document.getElementById('st-'+id);
    const isEcb = data.ecb && data.ecb.includes(id);

    card.className = 'bank-card ' + d.s + (isEcb?' ecb':'');
    const pct = Math.max(0, Math.min(100, d.c / 16 * 100));
    const col = d.s==='normal'?'var(--green)':d.s==='stressed'?'var(--orange)':'var(--red)';
    bar.style.width = pct + '%';
    bar.style.background = col;
    cv.textContent = d.c.toFixed(1) + '%';
    cv.style.color = col;
    lcr.textContent = d.l;
    st.className = 'status-tag ' + d.s;
    const statusText = d.s==='normal'?'HEALTHY':d.s==='stressed'?'STRESSED':'CRITICAL';
    st.textContent = statusText;
  }
}

/* ================================================================
   HUD UPDATE
   ================================================================ */
function updateHud(data, idx){
  document.getElementById('h-round').textContent = data.label;
  document.getElementById('h-loss').textContent = data.loss + ' BN';
  document.getElementById('h-loss').className = 'hud-val ' + (data.loss > 400 ? 'red' : 'orange');
  const crit = Object.values(data.b).filter(b=>b.s==='critical').length;
  document.getElementById('h-crit').textContent = crit;
  document.getElementById('h-ela').textContent = data.ela + ' BN';
}

/* ================================================================
   UPDATE TO ROUND
   ================================================================ */
let prevStatuses = {};

function goToRound(idx, animate){
  curRound = idx;
  const data = R[idx];
  if(!data) return;

  // Update 3D spheres + labels
  for(const [id, d] of Object.entries(data.b)){
    const m = meshes[id], g = glows[id];
    if(!m) continue;
    const col = STATUS_C[d.s] || C_GREEN;
    const t = animate ? 0.5 : 1;
    m.material.color.lerp(col, t);
    m.material.emissive.lerp(col, t);
    m.material.emissiveIntensity = d.s==='critical' ? 0.6 : 0.4;
    g.material.color.copy(col);
    g.material.opacity = d.s==='critical' ? 0.2 : 0.12;

    // Update CSS2D label CET1 text and color
    const lbl = bankLabelEls[id];
    if(lbl){
      const cet1El = lbl.querySelector('.lbl-cet1');
      if(cet1El){
        cet1El.textContent = 'CET1 '+d.c.toFixed(1)+'%';
        cet1El.style.color = d.s==='normal'?'#00ff41':d.s==='stressed'?'#ff6b00':'#ff0040';
      }
    }

    // Shockwave on status change to critical
    if(animate && d.s==='critical' && prevStatuses[id] !== 'critical'){
      spawnShockwave(id);
    }
  }
  prevStatuses = {};
  for(const [id,d] of Object.entries(data.b)) prevStatuses[id] = d.s;

  // Edge colors: bright green/orange/red (fix 2)
  for(const e of edges){
    const fs = data.b[e.userData.from], ts = data.b[e.userData.to];
    if(!fs||!ts){ continue; }
    const worst = [fs.s, ts.s];
    if(worst.includes('critical')){
      e.material.color.copy(C_RED);
      e.material.opacity = 0.6;
    } else if(worst.includes('stressed')){
      e.material.color.copy(C_ORANGE);
      e.material.opacity = 0.5;
    } else {
      e.material.color.copy(C_GREEN);
      e.material.opacity = 0.3 + e.userData.amt/15*0.4;
    }
  }

  // ECB
  ecbActive = !!(data.ecb && data.ecb.length > 0);
  const banner = document.getElementById('ecb-banner');
  if(ecbActive){
    banner.style.display = 'block';
    document.getElementById('ecb-amt').textContent = data.ela + ' BN EUR';
    for(const [id,obj] of Object.entries(ecbBeams)){
      obj.mat.opacity = data.ecb.includes(id) ? 0.5 : 0;
    }
    meshes.ECB.material.emissiveIntensity = 0.8;
    if(animate) spawnEcbParticles(data.ecb);
  } else {
    banner.style.display = 'none';
    for(const obj of Object.values(ecbBeams)) obj.mat.opacity = 0;
    meshes.ECB.material.emissiveIntensity = 0.5;
    clearEcbParticles();
  }

  updateBankCards(data);
  updateHud(data, idx);

  // Terminal events
  const ev = EVENTS[idx];
  if(ev && animate){
    typeLines(ev.lines);
  } else if(ev && !animate){
    ev.lines.forEach(l => addTermLine(l));
  }
}

/* ================================================================
   PLAYBACK CONTROLS
   ================================================================ */
function stepForward(){
  if(curRound < R.length - 1) goToRound(curRound + 1, true);
  else stopPlay();
}
function stepBack(){
  if(curRound > 0){
    clearTerminal();
    // Replay all terminal events up to previous round
    for(let i=0; i<curRound; i++){
      const ev = EVENTS[i];
      if(ev) ev.lines.forEach(l => addTermLine(l));
    }
    goToRound(curRound - 1, false);
  }
}

function startPlay(){
  playing = true;
  document.getElementById('btn-play').classList.add('active');
  document.getElementById('btn-play').innerHTML = '&#10074;&#10074; PAUSE';
  timer = setInterval(stepForward, speedMs);
}
function stopPlay(){
  playing = false;
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('btn-play').innerHTML = '&#9654; PLAY';
  if(timer){clearInterval(timer); timer=null;}
}
function resetSim(){
  stopPlay();
  clearTerminal();
  clearEcbParticles();
  shockwaves.forEach(s => scene.remove(s.mesh));
  shockwaves.length = 0;
  prevStatuses = {};
  goToRound(0, false);
}

document.getElementById('btn-play').addEventListener('click', ()=>{
  if(playing) stopPlay();
  else { if(curRound>=R.length-1) resetSim(); startPlay(); }
});
document.getElementById('btn-reset').addEventListener('click', resetSim);

// Speed slider
const slider = document.getElementById('speed-slider');
const speedLbl = document.getElementById('speed-label');
slider.addEventListener('input', ()=>{
  const v = parseInt(slider.value);
  speedMs = SPEEDS[v];
  speedLbl.textContent = SPEED_NAMES[v];
  if(playing){ stopPlay(); startPlay(); }
});

// Help
const helpBtn = document.getElementById('help-btn');
const helpModal = document.getElementById('help-modal');
helpBtn.addEventListener('click', ()=>{
  helpModal.style.display = helpModal.style.display==='block' ? 'none' : 'block';
});

// Keyboard
document.addEventListener('keydown', (e)=>{
  if(e.code==='Space'){e.preventDefault(); if(playing) stopPlay(); else { if(curRound>=R.length-1) resetSim(); startPlay(); }}
  if(e.code==='KeyR') resetSim();
  if(e.code==='ArrowRight'){e.preventDefault(); stopPlay(); stepForward();}
  if(e.code==='ArrowLeft'){e.preventDefault(); stopPlay(); stepBack();}
  if(e.key==='1'){slider.value=0;slider.dispatchEvent(new Event('input'));}
  if(e.key==='2'){slider.value=1;slider.dispatchEvent(new Event('input'));}
  if(e.key==='3'){slider.value=2;slider.dispatchEvent(new Event('input'));}
  if(e.key==='?') helpBtn.click();
});

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  orbit.update();

  // Bob spheres
  for(const [id, m] of Object.entries(meshes)){
    const b = BANKS[id];
    m.position.y = b.y + Math.sin(t*0.6 + b.x*0.5)*0.1;
  }

  // Shockwaves
  for(let i=shockwaves.length-1; i>=0; i--){
    const s = shockwaves[i];
    s.age += dt;
    const p = s.age / s.maxAge;
    s.mesh.scale.setScalar(1 + p*6);
    s.mesh.material.opacity = 0.6*(1-p);
    s.mesh.lookAt(camera.position);
    if(p >= 1){
      scene.remove(s.mesh);
      shockwaves.splice(i, 1);
    }
  }

  // ECB pulse
  if(ecbActive){
    const pulse = 0.3 + Math.sin(t*4)*0.3;
    for(const [id, obj] of Object.entries(ecbBeams)){
      const data = R[curRound];
      if(data && data.ecb && data.ecb.includes(id)){
        obj.mat.opacity = pulse;
      }
    }
    meshes.ECB.material.emissiveIntensity = 0.5 + Math.sin(t*4)*0.4;
    glows.ECB.material.opacity = 0.08 + Math.sin(t*4)*0.08;
  }

  // ECB particles
  for(const p of ecbParticles){
    p.t += dt * p.speed;
    if(p.t > 1) p.t -= 1;
    const tt = p.t;
    p.mesh.position.set(
      p.from.x + (p.to.x - p.from.x)*tt,
      p.from.y + (p.to.y - p.from.y)*tt + Math.sin(tt*Math.PI)*1.5,
      p.from.z + (p.to.z - p.from.z)*tt
    );
    p.mesh.material.opacity = 0.5 + Math.sin(tt*Math.PI)*0.5;
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

/* ================================================================
   RESIZE
   ================================================================ */
window.addEventListener('resize', ()=>{
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
  labelRenderer.setSize(W(), H());
});

/* ================================================================
   INIT
   ================================================================ */
buildBankCards();
goToRound(0, false);
animate();
</script>
</body>
</html>
