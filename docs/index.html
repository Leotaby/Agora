<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGORA - Banking Contagion Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#00ff41;--cyan:#00ffff;--orange:#ff6b00;--red:#ff0040;--blue:#0088ff;--bg:#000000;--panel:rgba(0,8,0,0.85);--border:rgba(0,255,65,0.15)}
body{background:var(--bg);color:var(--green);font-family:'Courier New',Courier,monospace;overflow:hidden;height:100vh;width:100vw}

/* Layout */
#app{display:flex;height:100vh;width:100vw}
#left-panel{width:220px;min-width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
#center{flex:1;position:relative}
#right-panel{width:200px;min-width:200px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:10}

/* Left panel - terminal feed */
#left-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,65,0.5)}
#terminal{flex:1;overflow-y:auto;padding:6px 8px;font-size:10px;line-height:1.6;scrollbar-width:none}
#terminal::-webkit-scrollbar{display:none}
.term-line{white-space:nowrap;overflow:hidden}
.term-line .ts{color:rgba(0,255,65,0.4)}
.term-line .ch{color:var(--cyan)}
.term-line .bank{color:#fff;font-weight:700}
.term-line .loss{color:var(--red)}
.term-line .ela{color:var(--blue)}
.term-line .amt{color:var(--orange)}
.term-cursor{display:inline-block;width:6px;height:12px;background:var(--green);animation:blink 0.8s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}

/* Right panel - bank status */
#right-header{padding:8px 10px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,65,0.5)}
#bank-list{flex:1;overflow-y:auto;padding:4px 0}
.bank-card{padding:8px 10px;margin:3px 6px;border:1px solid rgba(0,255,65,0.08);border-radius:2px;transition:all 0.5s}
.bank-card.normal{border-left:3px solid var(--green)}
.bank-card.stressed{border-left:3px solid var(--orange)}
.bank-card.critical{border-left:3px solid var(--red)}
.bank-card.ecb{border-left:3px solid var(--blue);background:rgba(0,60,180,0.1)}
.bank-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ffffff;margin-bottom:4px}
.cet1-num{font-size:16px;font-weight:700;margin-bottom:3px;transition:color 0.5s}
.cet1-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cet1-label{font-size:8px;color:rgba(0,255,65,0.4);width:28px;text-transform:uppercase}
.cet1-bar-bg{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.cet1-bar{height:100%;border-radius:2px;transition:width 0.8s ease,background 0.5s}
.bank-meta{font-size:8px;color:rgba(255,255,255,0.35);display:flex;justify-content:space-between;align-items:center}
.status-tag{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:2px;display:inline-block}
.status-tag.normal{color:var(--green);background:rgba(0,255,65,0.1)}
.status-tag.stressed{color:var(--orange);background:rgba(255,107,0,0.12)}
.status-tag.critical{color:var(--red);background:rgba(255,0,64,0.12)}

/* Bottom HUD */
#hud{position:absolute;bottom:0;left:0;right:0;margin-bottom:30px;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;gap:50px;padding:20px;z-index:10;pointer-events:none}
.hud-item{text-align:center}
.hud-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#aaaaaa;margin-bottom:4px}
.hud-val{font-size:22px;font-weight:700;text-shadow:0 0 10px currentColor}
.hud-val.green{color:var(--green)}
.hud-val.orange{color:var(--orange)}
.hud-val.red{color:var(--red)}
.hud-val.blue{color:var(--blue)}

/* Bottom play controls */
#bottom-controls{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:10px;padding-bottom:6px;z-index:11}
#bottom-controls button{background:rgba(0,20,0,0.8);border:1px solid rgba(0,255,65,0.3);color:var(--green);font-family:inherit;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
#bottom-controls button:hover{background:rgba(0,40,0,0.9);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,65,0.2)}
#bottom-controls button.active{background:rgba(0,60,0,0.8);border-color:var(--green);box-shadow:0 0 12px rgba(0,255,65,0.3)}
#bottom-controls #btn-play{width:180px;height:50px;font-size:18px}
#bottom-controls #btn-reset{width:90px;height:50px;font-size:12px}

/* Controls overlay - right aligned, speed + help only */
#controls{position:absolute;top:10px;right:10px;z-index:20;display:flex;gap:6px;align-items:center}
#speed-group{display:flex;align-items:center;gap:6px;margin-left:8px}
#speed-group label{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,255,65,0.4)}
#speed-slider{-webkit-appearance:none;width:80px;height:2px;background:rgba(0,255,65,0.2);outline:none;border-radius:1px}
#speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--green);border-radius:50%;cursor:pointer;box-shadow:0 0 6px var(--green)}
#speed-label{font-size:9px;color:var(--green);width:50px}

/* Title */
#title{position:absolute;top:10px;left:10px;z-index:15;text-align:left;pointer-events:none}
#title h1{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(0,255,65,0.4);font-weight:400}
#title .sub{font-size:9px;color:rgba(0,255,65,0.2);margin-top:2px}

/* Narrative box - center top */
#narrative{position:absolute;top:40px;left:50%;transform:translateX(-50%);z-index:25;
  background:rgba(0,0,0,0.88);border:1px solid rgba(0,255,65,0.25);padding:12px 28px;
  font-size:14px;color:#ffffff;text-align:center;pointer-events:none;max-width:600px;
  line-height:1.5;border-radius:3px;opacity:0;transition:opacity 0.3s}
#narrative.show{opacity:1}
#narrative .tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:700}
#narrative .tag.shock{color:var(--red)}
#narrative .tag.contagion{color:var(--orange)}
#narrative .tag.liquidity{color:var(--cyan)}
#narrative .tag.dollar{color:var(--cyan)}
#narrative .tag.firesale{color:var(--orange)}
#narrative .tag.ecb{color:var(--blue)}
#narrative .tag.system{color:var(--green)}

/* ECB banner */
#ecb-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;
  background:rgba(0,10,40,0.95);border:1px solid var(--blue);padding:16px 32px;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);
  display:none;text-align:center;pointer-events:none;box-shadow:0 0 40px rgba(0,136,255,0.3)}
#ecb-banner .amt{font-size:22px;font-weight:700;margin-top:6px;text-shadow:0 0 15px var(--blue)}

/* Help modal */
#help-btn{background:rgba(0,20,0,0.8);border:1px solid rgba(0,255,65,0.2);color:rgba(0,255,65,0.5);font-family:inherit;font-size:10px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#help-modal{display:none;position:absolute;top:40px;right:10px;z-index:50;background:rgba(0,8,0,0.95);border:1px solid var(--border);padding:12px 16px;font-size:9px;line-height:1.8;max-width:220px}
#help-modal kbd{background:rgba(0,255,65,0.1);border:1px solid rgba(0,255,65,0.2);padding:1px 5px;border-radius:2px;font-family:inherit}
</style>
</head>

    <button id="btn-play">&#9654; PLAY</button>
    <button id="btn-reset">RESET</button>
  </div>
</div>

<!-- RIGHT PANEL: Bank status -->
<div id="right-panel">
  <div id="right-header">&#9608; bank status</div>
  <div id="bank-list"></div>
</div>

</div>

/* ================================================================
   INTERBANK EDGES - bezier curves, dim baseline, bright on active
   ================================================================ */
function bezierCtrl(a,b,idx){
  const mid=new THREE.Vector3().addVectors(a,b).multiplyScalar(0.5);
  const dir=new THREE.Vector3().subVectors(b,a);
  const perp=new THREE.Vector3(-dir.z,0.4,dir.x).normalize();
  mid.addScaledVector(perp, 0.5+(idx%5)*0.2);
  return mid;
}
function sampleBez(p0,c,p1,t){const u=1-t;return new THREE.Vector3(u*u*p0.x+2*u*t*c.x+t*t*p1.x,u*u*p0.y+2*u*t*c.y+t*t*p1.y,u*u*p0.z+2*u*t*c.z+t*t*p1.z);}

const edges=[];
for(let i=0;i<EXPOSURES.length;i++){
  const e=EXPOSURES[i],ba=BANKS[e.f],bb=BANKS[e.t];
  if(!ba||!bb)continue;
  const p0=new THREE.Vector3(ba.x,ba.y,ba.z),p1=new THREE.Vector3(bb.x,bb.y,bb.z);
  const ctrl=bezierCtrl(p0,p1,i);
  const bankCol=BANK_COLORS[e.f]||C_GREEN;
  // TubeGeometry for thick visible lines
  const curve=new THREE.QuadraticBezierCurve3(p0,ctrl,p1);
  const tubeGeo=new THREE.TubeGeometry(curve,20,0.04,6,false);
  const mat=new THREE.MeshBasicMaterial({color:bankCol,transparent:true,opacity:0.8});
  const tube=new THREE.Mesh(tubeGeo,mat);
  tube.userData={from:e.f,to:e.t,amt:e.a,p0,p1,ctrl,bankCol:bankCol.clone()};
  scene.add(tube); edges.push(tube);
}

/* Active-edge flow particles: pool of 5 dots, only visible when an edge is active */
const flowPool=[];
for(let i=0;i<5;i++){
  const dot=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),new THREE.MeshBasicMaterial({color:C_WHITE,transparent:true,opacity:0}));
  scene.add(dot); flowPool.push({mesh:dot,t:i/5,active:false,edge:null,speed:0.4});
}
let activeEdge=null; // current edge userData being highlighted

function activateEdge(fromId,toId){
  activeEdge=null;
  for(const e of edges){
    if(e.userData.from===fromId && e.userData.to===toId){activeEdge=e.userData;break;}
  }
  for(const e of edges){
    if(activeEdge && e.userData===activeEdge){
      e.material.color.copy(C_WHITE); e.material.opacity=1.0;
    } else {
      e.material.color.copy(e.userData.bankCol); e.material.opacity=0.1;
    }
  }
  // Activate flow particles on active edge
  if(activeEdge){
    const col=activeEdge.bankCol;
    for(let i=0;i<flowPool.length;i++){
      flowPool[i].active=true; flowPool[i].edge=activeEdge; flowPool[i].t=i/flowPool.length;
      flowPool[i].mesh.material.color.copy(col); flowPool[i].mesh.material.opacity=0.9;
      flowPool[i].speed=0.3+activeEdge.amt/30;
    }
  } else {
    for(const d of flowPool){d.active=false;d.mesh.material.opacity=0;}
  }
}
function deactivateEdges(){
  activeEdge=null;
  for(const e of edges){e.material.color.copy(e.userData.bankCol);e.material.opacity=0.8;}
  for(const d of flowPool){d.active=false;d.mesh.material.opacity=0;}
}

function applyEvent(idx){
  curEvent=idx;
  const ev=STORY[idx]; if(!ev)return;
  const data=R[ev.ri]; if(!data)return;

  // Update round state if changed
  if(ev.ri!==prevRound){
    prevRound=ev.ri;
    for(const [id,d] of Object.entries(data.b)){
      const m=meshes[id],g=glows[id];if(!m)continue;
      const col=STATUS_C[d.s]||C_GREEN;
      m.material.color.copy(col);m.material.emissive.copy(col);
      m.material.emissiveIntensity=d.s==='critical'?0.6:0.4;
      g.material.color.copy(col);g.material.opacity=d.s==='critical'?0.2:0.12;
      const lbl=bankLabelEls[id];
      if(lbl){const el=lbl.querySelector('.lbl-cet1');if(el){el.textContent='CET1 '+d.c.toFixed(1)+'%';el.style.color=d.s==='normal'?'#00ff41':d.s==='stressed'?'#ff6b00':'#ff0040';}}
      if(d.s==='critical'&&prevStatuses[id]!=='critical')spawnShockwave(id);
    }
    prevStatuses={};for(const [id,d] of Object.entries(data.b))prevStatuses[id]=d.s;
    updateBankCards(data);updateHud(data);
  }

  // Narrative box
  showNarrative(ev.tag, ev.text);

  // Terminal line
  if(ev.term) addTermLine(ev.term);

  // Edge highlight: if event has from+to, activate that edge
  if(ev.from && ev.to){
    activateEdge(ev.from, ev.to);
  } else {
    deactivateEdges();
    // If just a 'from' bank, flash it
    if(ev.from){
      const m=meshes[ev.from];
      if(m){m.material.emissive.copy(C_WHITE);m.material.emissiveIntensity=0.8;
        setTimeout(()=>{const d=R[ev.ri].b[ev.from];if(d){const c=STATUS_C[d.s]||C_GREEN;m.material.emissive.copy(c);m.material.emissiveIntensity=d.s==='critical'?0.6:0.4;}},400);
      }
    }
  }

  // ECB handling
  ecbActive=!!(data.ecb&&data.ecb.length>0);
  const banner=document.getElementById('ecb-banner');
  if(ev.tag==='ecb'&&ev.to){
    for(const [id,obj] of Object.entries(ecbBeams))obj.mat.opacity=id===ev.to?0.7:0;
    meshes.ECB.material.emissiveIntensity=0.8;
    if(ecbParticles.length===0&&data.ecb)spawnEcbParticles(data.ecb);
    banner.style.display='block';document.getElementById('ecb-amt').textContent=data.ela+' BN EUR';
  } else if(!ecbActive){
    banner.style.display='none';
    for(const obj of Object.values(ecbBeams))obj.mat.opacity=0;
    meshes.ECB.material.emissiveIntensity=0.5;
    clearEcbParticles();
  }
}

/* ================================================================
   PLAYBACK
   ================================================================ */
function stepForward(){
  if(curEvent<STORY.length-1)applyEvent(curEvent+1);
  else stopPlay();
}
function stepBack(){
  if(curEvent>0){
    clearTerminal();prevRound=-1;prevStatuses={};deactivateEdges();hideNarrative();
    clearEcbParticles();document.getElementById('ecb-banner').style.display='none';
    for(let i=0;i<=curEvent-1;i++)applyEvent(i);
  }
}
function startPlay(){playing=true;document.getElementById('btn-play').classList.add('active');document.getElementById('btn-play').innerHTML='&#10074;&#10074; PAUSE';timer=setInterval(stepForward,speedMs);}
function stopPlay(){playing=false;document.getElementById('btn-play').classList.remove('active');document.getElementById('btn-play').innerHTML='&#9654; PLAY';if(timer){clearInterval(timer);timer=null;}}
function resetSim(){stopPlay();clearTerminal();clearEcbParticles();hideNarrative();deactivateEdges();
  shockwaves.forEach(s=>scene.remove(s.mesh));shockwaves.length=0;
  prevStatuses={};prevRound=-1;curEvent=0;
  document.getElementById('ecb-banner').style.display='none';
  applyEvent(0);}

document.getElementById('btn-play').addEventListener('click',()=>{if(playing)stopPlay();else{if(curEvent>=STORY.length-1)resetSim();startPlay();}});
document.getElementById('btn-reset').addEventListener('click',resetSim);
const slider=document.getElementById('speed-slider'),speedLbl=document.getElementById('speed-label');
slider.value=1;
slider.addEventListener('input',()=>{const v=parseInt(slider.value);speedMs=SPEEDS[v];speedLbl.textContent=SPEED_NAMES[v];if(playing){stopPlay();startPlay();}});
const helpBtn=document.getElementById('help-btn'),helpModal=document.getElementById('help-modal');
helpBtn.addEventListener('click',()=>{helpModal.style.display=helpModal.style.display==='block'?'none':'block';});
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();if(playing)stopPlay();else{if(curEvent>=STORY.length-1)resetSim();startPlay();}}
  if(e.code==='KeyR')resetSim();
  if(e.code==='ArrowRight'){e.preventDefault();stopPlay();stepForward();}
  if(e.code==='ArrowLeft'){e.preventDefault();stopPlay();stepBack();}
  if(e.key==='1'){slider.value=0;slider.dispatchEvent(new Event('input'));}
  if(e.key==='2'){slider.value=1;slider.dispatchEvent(new Event('input'));}
  if(e.key==='3'){slider.value=2;slider.dispatchEvent(new Event('input'));}
  if(e.key==='?')helpBtn.click();
});

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime(),dt=Math.min(clock.getDelta(),0.05);
  orbit.update();

  // Bob
  for(const [id,m] of Object.entries(meshes)){const b=BANKS[id];m.position.y=b.y+Math.sin(t*0.6+b.x*0.5)*0.1;}

  // Flow particles on active edge only
  for(const d of flowPool){
    if(!d.active||!d.edge)continue;
    d.t+=dt*d.speed;if(d.t>1)d.t-=1;
    const pos=sampleBez(d.edge.p0,d.edge.ctrl,d.edge.p1,d.t);
    d.mesh.position.copy(pos);
    d.mesh.material.opacity=0.5+Math.sin(d.t*Math.PI)*0.5;
  }

  // Shockwaves
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];s.age+=dt;const p=s.age/s.maxAge;
    s.mesh.scale.setScalar(1+p*6);s.mesh.material.opacity=0.6*(1-p);s.mesh.lookAt(camera.position);
    if(p>=1){scene.remove(s.mesh);shockwaves.splice(i,1);}
  }

  // ECB pulse
  if(ecbActive){
    const pulse=0.3+Math.sin(t*4)*0.3;
    for(const [id,obj] of Object.entries(ecbBeams)){if(obj.mat.opacity>0.01)obj.mat.opacity=pulse;}
    meshes.ECB.material.emissiveIntensity=0.5+Math.sin(t*4)*0.4;
    glows.ECB.material.opacity=0.08+Math.sin(t*4)*0.08;
  }
  for(const p of ecbParticles){
    p.t+=dt*p.speed;if(p.t>1)p.t-=1;
    p.mesh.position.set(p.from.x+(p.to.x-p.from.x)*p.t,p.from.y+(p.to.y-p.from.y)*p.t+Math.sin(p.t*Math.PI)*2,p.from.z+(p.to.z-p.from.z)*p.t);
    p.mesh.material.opacity=0.5+Math.sin(p.t*Math.PI)*0.5;
  }

  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}

/* ================================================================
   RESIZE + INIT
   ================================================================ */
window.addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());labelRenderer.setSize(W(),H());});
buildBankCards();
applyEvent(0);
animate();
</script>
