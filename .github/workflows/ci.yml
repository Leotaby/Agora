name: AGORA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — banking core tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv pip install --system -r requirements.txt

      - name: Import check — banking models
        working-directory: backend
        run: python -c "from app.models.bank import Bank, BankType, BankStatus; from app.models.interbank_network import InterbankNetwork; print('Banking models OK')"

      - name: Import check — contagion engine
        working-directory: backend
        run: python -c "from app.services.contagion_engine import ContagionEngine, BankingShock; print('Contagion engine OK')"

      - name: Run banking contagion simulation
        working-directory: backend
        run: python scripts/run_banking_sim.py

  frontend-build:
    name: Frontend — build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
